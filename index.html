<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairway Forge Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        h1, h2 { font-family: 'Playfair Display', serif; }
    </style>
</head>
<body class="bg-white text-slate-800 p-8">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-3 p-10 bg-slate-50 rounded-lg border border-slate-200">
            <h1 class="text-6xl font-bold tracking-tight text-slate-950">Fairway Forge Media</h1>
            <p class="mt-4 text-slate-700 max-w-2xl text-xl">Reverse-engineering the intersection of professional sports and emerging technology.</p>
        </div>

        <div class="p-8 bg-slate-50 rounded-lg border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-950 mb-2">The Lab</h2>
            <p class="text-slate-700">3D printing and DIY golf tech projects.</p>
        </div>

        <div class="p-8 bg-slate-50 rounded-lg border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-950 mb-2">ShotLink 2.0</h2>
            <p class="text-slate-700">Deep dives into tournament infrastructure.</p>
        </div>

        <div class="p-8 bg-slate-50 rounded-lg border border-slate-200">
            <h2 class="text-2xl font-bold text-slate-950 mb-2">Press Kit</h2>
            <p class="text-slate-700">Credentialing info and contact for WGA.</p>
        </div>
        
    </div>
</body>
</html>
