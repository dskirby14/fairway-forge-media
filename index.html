<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fairway Forge Media</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-white p-8">
    <div class="max-w-6xl mx-auto grid grid-cols-1 md:grid-cols-3 gap-6">
        
        <div class="md:col-span-3 p-8 bg-slate-900 rounded-2xl border border-slate-700">
            <h1 class="text-4xl font-mono font-bold tracking-tighter">Fairway Forge Media</h1>
            <p class="mt-4 text-slate-400">Reverse-engineering the intersection of professional sports and emerging technology.</p>
        </div>

        <div class="p-6 bg-slate-900 rounded-2xl border border-slate-700">
            <h2 class="font-mono text-xl">The Lab</h2>
            <p class="text-slate-400">3D printing and DIY golf tech projects.</p>
        </div>

        <div class="p-6 bg-slate-900 rounded-2xl border border-slate-700">
            <h2 class="font-mono text-xl">ShotLink 2.0</h2>
            <p class="text-slate-400">Deep dives into tournament infrastructure.</p>
        </div>

        <div class="p-6 bg-slate-900 rounded-2xl border border-slate-700">
            <h2 class="font-mono text-xl">Press Kit</h2>
            <p class="text-slate-400">Credentialing info and contact for WGA.</p>
        </div>
        
    </div>
</body>
</html>
